<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIME Gallery | Sarthik</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700&family=Space+Mono&display=swap"
        rel="stylesheet">
    <style>
        .food-gallery-container {
            padding: 8rem 4rem 4rem 4rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .gallery-title {
            font-family: var(--font-heading);
            font-size: clamp(3rem, 8vw, 6rem);
            margin-bottom: 3rem;
            text-align: center;
        }

        .masonry-grid {
            columns: 3;
            column-gap: 2rem;
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 2rem;
            position: relative;
            background-color: #111;
            overflow: hidden;
            border-radius: 4px;
        }

        .masonry-item img {
            width: 100%;
            display: block;
            transition: transform 0.5s ease, filter 0.5s ease;
        }

        .item-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .masonry-item:hover .item-overlay {
            opacity: 1;
        }

        .masonry-item:hover img {
            transform: scale(1.05);
            filter: blur(2px);
        }

        .item-title {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text-color);
        }

        .download-btn {
            background-color: var(--text-color);
            color: #000;
            padding: 0.8rem 1.5rem;
            font-family: var(--font-secondary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            text-decoration: none;
            border-radius: 2px;
            transition: background-color 0.3s ease;
        }

        .download-btn:hover {
            background-color: #fff;
        }

        .back-link {
            display: block;
            margin-bottom: 2rem;
            color: rgba(245, 245, 243, 0.6);
            text-decoration: none;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .back-link:hover {
            color: var(--text-color);
        }

        @media (max-width: 1000px) {
            .masonry-grid {
                columns: 2;
            }
        }

        @media (max-width: 600px) {
            .masonry-grid {
                columns: 1;
            }

            .food-gallery-container {
                padding: 6rem 1.5rem 2rem 1.5rem;
            }
        }
    </style>
</head>

<body> <!-- Simple black background -->
    <header class="top-bar">
        <a href="index.html" class="logo-link">
            <div class="nav-items-desktop">
                <div class="nav-item"><span>PRESENTED BY:</span> Sarthik</div>
            </div>
        </a>
    </header>

    <main class="food-gallery-container">
        <a href="index.html#gallery" class="back-link">← Back to Gallery</a>

        <h1 class="gallery-title">Anime Art</h1>

        <div class="masonry-grid">
            <div class="masonry-item">
                <img src="FOOTBALL/art7-kaiser.png" alt="kaiser art">
                <div class="item-overlay">
                    <a href="FOOTBALL/art7-kaiser.png" download="art" class="download-btn">Download High-Res</a>
                </div>
            </div>

            
        </div>
    </main>

    <script>
        // Additional JavaScript for analytics or direct download handling if needed
        // For now, HTML5 'download' attribute handles the direct download requirement
    </script>
</body>

</html>
